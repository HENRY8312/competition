<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration - Mathematics Competition</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: "Segoe UI", Arial, sans-serif;
background: linear-gradient(135deg,#007bff,#00c6ff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:white;
padding:40px 30px;
border-radius:15px;
width:100%;
max-width:420px;
box-shadow:0 12px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#333;
font-size:26px;
font-weight:bold;
}

form{
margin-top:10px;
}

input, select{
width:100%;
padding:14px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
transition:0.2s;
}

input:focus, select:focus{
border-color:#007bff;
outline:none;
box-shadow:0 0 5px rgba(0,123,255,0.3);
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:linear-gradient(45deg,#007bff,#00aaff);
color:white;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:linear-gradient(45deg,#0056b3,#0088cc);
transform:scale(1.03);
}

.login-link{
margin-top:20px;
font-size:15px;
}

.login-link a{
color:#007bff;
text-decoration:none;
font-weight:bold;
}

.login-link a:hover{
text-decoration:underline;
}

/* Desktop improvement */

@media(min-width:768px){

.container{
padding:50px 40px;
}

h2{
font-size:30px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Register for Mathematics Competition</h2>

<form id="registerForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="text" id="phone" placeholder="Phone Number" required>

<select id="class" required>
<option value="">Select Class</option>
<option value="JSS1">JSS1</option>
<option value="JSS2">JSS2</option>
<option value="JSS3">JSS3</option>
<option value="SS1">SS1</option>
<option value="SS2">SS2</option>
<option value="SS3">SS3</option>
</select>

<input type="text" id="parish" placeholder="Parish Name" required>

<input type="number" id="yearsWatchman" placeholder="How many years have you been a Watchman?" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<div class="login-link">
Already registered? <a href="login.html">Login</a>
</div>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit", async function(e){

e.preventDefault()

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const phone = document.getElementById("phone").value;
const studentClass = document.getElementById("class").value;
const parish = document.getElementById("parish").value;
const yearsWatchman = document.getElementById("yearsWatchman").value;
const password = document.getElementById("password").value;

const res = await fetch("/register", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
name,
email,
phone,
studentClass,
parish,
yearsWatchman,
password
})
});

const data = await res.json()

alert(data.message)

})

</script>

</body>
</html>
