<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login - Mathematics Competition</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Segoe UI", Arial, sans-serif;
background:linear-gradient(-45deg,#007bff,#00c6ff,#00aaff,#0056b3);
background-size:400% 400%;
animation:gradient 10s ease infinite;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.login-container{
background:white;
padding:40px 30px;
border-radius:15px;
width:100%;
max-width:400px;
box-shadow:0 12px 30px rgba(0,0,0,0.2);
text-align:center;
}

/* Competition branding */

.logo img{
width:70px;
margin-bottom:10px;
}

.logo h1{
font-size:20px;
color:#007bff;
margin-bottom:5px;
}

.logo p{
font-size:13px;
color:#666;
margin-bottom:15px;
}

h2{
margin-bottom:20px;
color:#333;
font-size:26px;
font-weight:bold;
}

.notice{
background:#f1f7ff;
padding:10px;
border-radius:6px;
font-size:13px;
margin-bottom:10px;
color:#333;
}

form{
margin-top:10px;
}

.input-box{
position:relative;
}

.input-box span{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
font-size:16px;
}

input{
width:100%;
padding:14px 14px 14px 35px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
transition:0.2s;
}

input:focus{
border-color:#007bff;
outline:none;
box-shadow:0 0 5px rgba(0,123,255,0.3);
}

/* Password toggle */

.password-box{
position:relative;
}

.password-box .toggle{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:linear-gradient(45deg,#007bff,#00aaff);
color:white;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:linear-gradient(45deg,#0056b3,#0088cc);
transform:scale(1.03);
}

.remember{
font-size:14px;
text-align:left;
margin-top:5px;
}

.forgot{
font-size:13px;
margin-top:8px;
text-align:right;
}

.forgot a{
color:#007bff;
text-decoration:none;
}

.forgot a:hover{
text-decoration:underline;
}

.register-link{
margin-top:20px;
font-size:15px;
}

.register-link a{
color:#007bff;
text-decoration:none;
font-weight:bold;
}

.register-link a:hover{
text-decoration:underline;
}

.admin-link{
margin-top:10px;
font-size:13px;
}

.footer{
margin-top:25px;
font-size:12px;
color:#888;
}

/* Mobile */

@media(max-width:768px){

.login-container{
padding:30px 20px;
}

h2{
font-size:22px;
}

input{
font-size:15px;
}

}

</style>

</head>

<body>

<div class="login-container">

<!-- Competition Branding -->

<div class="logo">
<img src="logo.png" alt="Competition Logo">
<h1>National Mathematics Competition</h1>
<p>2026 Edition</p>
</div>

<h2>Student Login</h2>

<div class="notice">
⚠ Use the email and password you registered with.
</div>

<form id="loginForm">

<div class="input-box">
<span>📧</span>
<input type="email" id="email" placeholder="Email Address" required>
</div>

<div class="password-box">
<span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);">🔒</span>
<input type="password" id="password" placeholder="Password" required style="padding-left:35px;">
<span class="toggle" onclick="togglePassword()">👁</span>
</div>

<div class="remember">
<label>
<input type="checkbox" id="remember"> Remember me
</label>
</div>

<div class="forgot">
<a href="forgot.html">Forgot Password?</a>
</div>

<button type="submit" id="loginBtn">Login</button>

</form>

<div class="register-link">
Don't have an account? <a href="register.html">Register</a>
</div>

<div class="admin-link">
Admin? <a href="admin.html">Login here</a>
</div>

<div class="footer">
© 2026 National Mathematics Competition
</div>

</div>

<script>

/* Prevent logged-in users from returning */

if(localStorage.getItem("studentId")){
window.location="quiz.html";
}

/* Show / hide password */

function togglePassword(){
const pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}
}

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();

const btn=document.getElementById("loginBtn");

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(password.length < 6){
alert("Password must be at least 6 characters");
return;
}

btn.innerText="Logging in...";
btn.disabled=true;

try{

const res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data=await res.json();

if(data.success){

localStorage.setItem("studentId",data.studentId);

alert("Login successful! Redirecting to quiz...");

window.location="quiz.html";

}else{

alert("Invalid email or password");
btn.innerText="Login";
btn.disabled=false;

}

}catch(err){

console.log(err);

alert("Unable to login. Please try again.");

btn.innerText="Login";
btn.disabled=false;

}

});

</script>

</body>

</html>
