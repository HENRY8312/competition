<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Competition Dashboard</title>

<style>
/* --- Global Reset --- */
* {
  margin:0; padding:0; box-sizing:border-box;
  font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
}

/* --- Body & Layout --- */
body {
  background: #f5f6fa;
  color: #333;
  display: flex;
  min-height: 100vh;
}

/* --- Sidebar --- */
.sidebar {
  width: 220px;
  background: #192a56;
  color: #fff;
  display: flex;
  flex-direction: column;
  padding: 20px;
}

.sidebar h2 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 22px;
}

.sidebar a {
  color: #fff;
  text-decoration: none;
  padding: 12px 15px;
  border-radius: 6px;
  margin-bottom: 10px;
  display: block;
  transition: 0.2s;
}

.sidebar a:hover, .sidebar a.active {
  background: #40739e;
}

/* --- Main Content --- */
.main {
  flex: 1;
  padding: 30px;
  overflow-x: auto;
}

/* --- Dashboard Cards --- */
.dashboard-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background: #fff;
  flex: 1 1 200px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.12);
}

.card h3 {
  margin-bottom: 15px;
  font-weight: 600;
  color: #192a56;
}

.card p {
  font-size: 28px;
  font-weight: bold;
  color: #40739e;
}

/* --- Tables --- */
.table-wrapper {
  overflow-x:auto;
  margin-bottom: 30px;
}

table {
  width: 100%;
  border-collapse: collapse;
  border-radius: 10px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

th, td {
  padding: 14px;
  text-align: center;
  font-size: 14px;
}

th {
  background: #40739e;
  color: #fff;
  text-transform: uppercase;
}

tr:nth-child(even) { background: #f1f2f6; }
tr:hover { background: #dcdde1; }

/* --- Buttons --- */
button {
  background-color: #273c75;
  color: #fff;
  border: none;
  cursor: pointer;
  font-weight: 600;
  border-radius: 6px;
  padding: 10px 18px;
  transition: 0.2s;
}

button:hover { background-color: #192a56; transform: scale(1.02); }

/* --- Forms --- */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #dcdde1;
  font-size: 14px;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #40739e;
  box-shadow: 0 0 6px rgba(64,115,158,0.2);
}

/* --- Responsive --- */
@media(max-width:900px){
  body { flex-direction: column; }
  .sidebar { width: 100%; flex-direction: row; justify-content: space-around; padding: 10px; }
  .sidebar h2 { display:none; }
  .main { padding: 15px; }
  .dashboard-cards { flex-direction: column; }
}
</style>
</head>

<body>

<!-- Sidebar Navigation -->
<div class="sidebar">
  <h2>Dashboard</h2>
  <a href="#" class="active" onclick="showSection('dashboard')">Home</a>
  <a href="#" onclick="showSection('questions')">Questions</a>
  <a href="#" onclick="showSection('students')">Students</a>
  <a href="#" onclick="showSection('leaderboard')">Leaderboard</a>
  <a href="#" onclick="logoutAdmin()">Logout</a>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Dashboard Home -->
  <div id="dashboard-section">
    <div class="dashboard-cards">
      <div class="card">
        <h3>Total Questions</h3>
        <p id="totalQuestions">0</p>
      </div>
      <div class="card">
        <h3>Total Students</h3>
        <p id="totalStudents">0</p>
      </div>
      <div class="card">
        <h3>Average Score</h3>
        <p id="averageScore">0</p>
      </div>
    </div>

    <h3>Top 5 Students (Leaderboard Preview)</h3>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>#</th><th>Name</th><th>Score</th></tr>
        </thead>
        <tbody id="leaderboardPreview"></tbody>
      </table>
    </div>
  </div>

  <!-- Questions Section -->
  <div id="questions-section" style="display:none;">
    <h3>Add Question</h3>
    <form id="question-form">
      <textarea id="questionText" placeholder="Enter question" required></textarea>
      <input type="text" id="optionA" placeholder="Option A" required>
      <input type="text" id="optionB" placeholder="Option B" required>
      <input type="text" id="optionC" placeholder="Option C" required>
      <input type="text" id="optionD" placeholder="Option D" required>
      <select id="correctAnswer" required>
        <option value="">Select Correct Answer</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>
      <button type="submit">Add Question</button>
    </form>

    <h3>All Questions</h3>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Question</th><th>A</th><th>B</th><th>C</th><th>D</th><th>Correct</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="questionsTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Students Section -->
  <div id="students-section" style="display:none;">
    <h3>Registered Students</h3>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Parish</th><th>Score</th><th>Action</th></tr>
        </thead>
        <tbody id="studentsTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Leaderboard Section -->
  <div id="leaderboard-section" style="display:none;">
    <h3>Leaderboard</h3>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>#</th><th>Name</th><th>Score</th></tr>
        </thead>
        <tbody id="leaderboardTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
// Section switching
function showSection(section){
  ['dashboard','questions','students','leaderboard'].forEach(s=>{
    document.getElementById(s+'-section').style.display = (s===section)?'block':'none';
  });
}

// Admin login simulation (replace with real auth)
const adminLoggedIn = localStorage.getItem('adminLoggedIn');
if(!adminLoggedIn){ 
  alert('Please login first! Redirecting...');
  // redirect to login page if needed
  localStorage.setItem('adminLoggedIn','true'); // remove in production
}

// Logout
function logoutAdmin(){
  localStorage.removeItem('adminLoggedIn');
  location.reload();
}

// Demo data
const demoQuestions = [
  {id:1, question:'2+2?', optionA:'2',optionB:'3',optionC:'4',optionD:'5',answer:'C'},
  {id:2, question:'3*3?', optionA:'6',optionB:'9',optionC:'12',optionD:'15',answer:'B'}
];

const demoStudents = [
  {id:1,name:'Alice',score:90},{id:2,name:'Bob',score:85},{id:3,name:'Charlie',score:80}
];

// Populate dashboard stats
document.getElementById('totalQuestions').innerText = demoQuestions.length;
document.getElementById('totalStudents').innerText = demoStudents.length;
document.getElementById('averageScore').innerText = Math.round(demoStudents.reduce((a,b)=>a+b.score,0)/demoStudents.length);

// Populate leaderboard preview
const lbPrev = document.getElementById('leaderboardPreview');
demoStudents.sort((a,b)=>b.score-a.score).slice(0,5).forEach((s,i)=>{
  lbPrev.innerHTML += `<tr><td>${i+1}</td><td>${s.name}</td><td>${s.score}</td></tr>`;
});

// Populate tables (demo)
const questionsTableBody = document.getElementById('questionsTableBody');
demoQuestions.forEach((q,i)=>{
  questionsTableBody.innerHTML += `<tr>
    <td>${i+1}</td><td>${q.question}</td><td>${q.optionA}</td><td>${q.optionB}</td><td>${q.optionC}</td>
    <td>${q.optionD}</td><td>${q.answer}</td><td><button onclick="alert('Delete question')">Delete</button></td>
  </tr>`;
});

const studentsTableBody = document.getElementById('studentsTableBody');
demoStudents.forEach((s,i)=>{
  studentsTableBody.innerHTML += `<tr>
    <td>${i+1}</td><td>${s.name}</td><td>email@example.com</td><td>1234567890</td><td>Parish</td><td>${s.score}</td>
    <td><button onclick="alert('Delete student')">Delete</button></td>
  </tr>`;
});

// Leaderboard table
const leaderboardTable = document.getElementById('leaderboardTable');
demoStudents.sort((a,b)=>b.score-a.score).forEach((s,i)=>{
  leaderboardTable.innerHTML += `<tr><td>${i+1}</td><td>${s.name}</td><td>${s.score}</td></tr>`;
});
</script>
</body>
</html>
