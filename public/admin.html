<!-- Questions -->
<div id="questions-section" style="display:none;">
  <h3>Manage Questions</h3>

  <!-- Search -->
  <div class="search-box">
    <input type="text" id="questionSearch" placeholder="Search by question text or options" onkeyup="filterQuestions()">
  </div>

  <!-- Upload Questions -->
  <h4>Upload Questions (Word/PDF)</h4>
  <input type="file" id="questionFile" accept=".docx,.pdf">
  <button onclick="uploadQuestions()">Upload & Preview</button>
  <div id="previewArea"></div>
  <button id="saveUploadBtn" style="display:none" onclick="saveUploadedQuestions()">Save Questions</button>

  <!-- Questions Table -->
  <div class="table-wrapper" style="margin-top:15px;">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Question</th>
          <th>A</th>
          <th>B</th>
          <th>C</th>
          <th>D</th>
          <th>Correct</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="questionsTableBody"></tbody>
    </table>
  </div>

  <!-- Add Question Manually -->
  <h3>Add Question Manually</h3>
  <form id="question-form">
    <textarea id="questionText" placeholder="Enter question" required></textarea>
    <input type="text" id="optionA" placeholder="Option A" required>
    <input type="text" id="optionB" placeholder="Option B" required>
    <input type="text" id="optionC" placeholder="Option C" required>
    <input type="text" id="optionD" placeholder="Option D" required>
    <select id="correctAnswer" required>
      <option value="">Select Correct Answer</option>
      <option value="A">A</option>
      <option value="B">B</option>
      <option value="C">C</option>
      <option value="D">D</option>
    </select>
    <button type="submit">Add Question</button>
  </form>
</div>

<script>
// ---------- SEARCH ----------
function filterQuestions(){
  const filter = document.getElementById('questionSearch').value.toLowerCase();
  document.querySelectorAll('#questionsTableBody tr').forEach(row=>{
    const values = Array.from(row.querySelectorAll('td span')).map(s=>s.innerText.toLowerCase());
    row.style.display = values.some(v=>v.includes(filter)) ? '' : 'none';
  });
}

// ---------- FETCH QUESTIONS ----------
async function fetchQuestions(){
  try{
    const res = await fetch('/admin/questions');
    const data = await res.json();
    const tbody = document.getElementById('questionsTableBody');
    tbody.innerHTML = '';
    if(data.success && data.questions.length > 0){
      data.questions.forEach((q,i)=>{
        tbody.innerHTML += `<tr id="qrow${q.id}">
          <td>${i+1}</td>
          <td><span class="qtext">${q.question}</span></td>
          <td><span class="optA">${q.optionA}</span></td>
          <td><span class="optB">${q.optionB}</span></td>
          <td><span class="optC">${q.optionC}</span></td>
          <td><span class="optD">${q.optionD}</span></td>
          <td><span class="correct">${q.answer}</span></td>
          <td>
            <button onclick="editQuestion(${q.id})">Edit</button>
            <button onclick="deleteQuestion(${q.id})">Delete</button>
          </td>
        </tr>`;
      });
    } else tbody.innerHTML = "<tr><td colspan='8'>No questions yet</td></tr>";
  } catch(e){ console.error(e); }
}

// ---------- INLINE EDIT ----------
function editQuestion(id){
  const row = document.getElementById(`qrow${id}`);
  ['qtext','optA','optB','optC','optD','correct'].forEach(cls=>{
    const span = row.querySelector(`.${cls}`);
    const val = span.innerText;
    span.innerHTML = `<input type="text" value="${val}" style="width:90%">`;
  });
  const btnCell = row.querySelector('td:last-child');
  btnCell.innerHTML = `<button onclick="saveQuestion(${id})">Save</button> <button onclick="cancelEdit(${id})">Cancel</button>`;
  row.style.background = '#f1f2f6'; // highlight
}

async function saveQuestion(id){
  const row = document.getElementById(`qrow${id}`);
  const q = row.querySelector('.qtext input').value;
  const A = row.querySelector('.optA input').value;
  const B = row.querySelector('.optB input').value;
  const C = row.querySelector('.optC input').value;
  const D = row.querySelector('.optD input').value;
  const ans = row.querySelector('.correct input').value;

  try{
    const res = await fetch(`/admin/question/${id}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q, optionA:A, optionB:B, optionC:C, optionD:D, answer:ans})
    });
    const data = await res.json();
    if(data.success){ fetchQuestions(); alert('Question updated!'); }
    else alert('Update failed');
  } catch(e){ console.error(e); alert('Error'); }
}

function cancelEdit(id){ fetchQuestions(); }

// ---------- DELETE ----------
async function deleteQuestion(id){
  if(!confirm('Delete this question?')) return;
  try{
    const res = await fetch(`/admin/question/${id}`,{method:'DELETE'});
    const data = await res.json();
    if(data.success) fetchQuestions(); else alert('Delete failed');
  } catch(e){ console.error(e); alert('Error'); }
}

// ---------- ADD QUESTION MANUALLY ----------
document.getElementById('question-form').addEventListener('submit', async e=>{
  e.preventDefault();
  const question=document.getElementById('questionText').value;
  const optionA=document.getElementById('optionA').value;
  const optionB=document.getElementById('optionB').value;
  const optionC=document.getElementById('optionC').value;
  const optionD=document.getElementById('optionD').value;
  const answer=document.getElementById('correctAnswer').value;
  try{
    const res = await fetch(`/addQuestion`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({question,optionA,optionB,optionC,optionD,answer})
    });
    const data = await res.json();
    if(data.success){ alert('Question added!'); e.target.reset(); fetchQuestions(); }
    else alert('Failed to add question');
  } catch(e){ console.error(e); alert('Error'); }
});

// ---------- FILE UPLOAD ----------
async function uploadQuestions(){
  const fileInput = document.getElementById('questionFile');
  if(!fileInput.files[0]) return alert("Select a file");
  const formData = new FormData();
  formData.append('questionFile', fileInput.files[0]);
  try{
    const res = await fetch('/uploadQuestionsFile', { method:'POST', body: formData });
    const data = await res.json();
    if(data.success){
      document.getElementById('previewArea').innerHTML = data.previewHTML;
      document.getElementById('saveUploadBtn').style.display='inline-block';
    } else alert(data.message || 'Upload failed');
  } catch(e){ console.error(e); alert('Upload error'); }
}

async function saveUploadedQuestions(){
  try{
    const res = await fetch('/saveUploadedQuestions',{method:'POST'});
    const data = await res.json();
    if(data.success){ 
      alert('Questions saved'); 
      document.getElementById('previewArea').innerHTML=''; 
      document.getElementById('saveUploadBtn').style.display='none'; 
      fetchQuestions(); 
    } else alert(data.message || 'Save failed');
  } catch(e){ console.error(e); alert('Error'); }
}

// ---------- INITIAL LOAD ----------
window.onload = function(){
  fetchDashboard();
  fetchStudents();
  fetchLeaderboard();
  fetchQuestions();
};
