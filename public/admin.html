<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Competition Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* --- Global --- */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
body { display:flex; min-height:100vh; background:#f4f6f8; color:#333; }

/* --- Sidebar --- */
.sidebar {
  width:220px; background:#2f3640; color:#fff; display:flex; flex-direction:column; padding:20px;
}
.sidebar h2 { text-align:center; margin-bottom:30px; font-size:22px; }
.sidebar a { color:#fff; text-decoration:none; padding:12px 15px; border-radius:6px; margin-bottom:10px; display:block; transition:0.2s; }
.sidebar a:hover, .sidebar a.active { background:#40739e; }

/* --- Main --- */
.main { flex:1; padding:30px; overflow-x:auto; }

/* --- Dashboard Cards --- */
.dashboard-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:30px; }
.card { background:#fff; padding:20px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.05); display:flex; flex-direction:column; align-items:center; justify-content:center; transition:0.3s; }
.card:hover { transform:translateY(-3px); box-shadow:0 12px 25px rgba(0,0,0,0.1); }
.card h3 { margin-bottom:10px; font-weight:500; color:#2f3640; }
.card p { font-size:28px; font-weight:700; color:#40739e; }

/* --- Search Box --- */
.search-box { margin-bottom:20px; }
.search-box input { width:100%; padding:10px 15px; font-size:14px; border-radius:6px; border:1px solid #dcdde1; }
.search-box input:focus { outline:none; border-color:#40739e; box-shadow:0 0 6px rgba(64,115,158,0.2); }

/* --- Tables --- */
.table-wrapper { overflow-x:auto; margin-bottom:30px; }
table { width:100%; border-collapse:collapse; border-radius:10px; overflow:hidden; background:#fff; box-shadow:0 4px 15px rgba(0,0,0,0.05); }
th, td { padding:14px; text-align:center; font-size:14px; }
th { background:#40739e; color:#fff; text-transform:uppercase; }
tr:nth-child(even){ background:#f1f2f6; }
tr:hover { background:#dcdde1; transition:0.2s; }

/* --- Buttons --- */
button { background-color:#273c75; color:#fff; border:none; cursor:pointer; font-weight:600; border-radius:6px; padding:8px 16px; transition:0.2s; }
button:hover { background-color:#192a56; transform:scale(1.02); }

/* --- Responsive --- */
@media(max-width:900px){
  body { flex-direction:column; }
  .sidebar { width:100%; flex-direction:row; justify-content:space-around; padding:10px; }
  .sidebar h2 { display:none; }
  .main { padding:15px; }
  .dashboard-cards { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>Admin Dashboard</h2>
  <a href="#" class="active" onclick="showSection('dashboard')">Home</a>
  <a href="#" onclick="showSection('questions')">Questions</a>
  <a href="#" onclick="showSection('students')">Students</a>
  <a href="#" onclick="showSection('leaderboard')">Leaderboard</a>
  <a href="#" onclick="logoutAdmin()">Logout</a>
</div>

<!-- Main -->
<div class="main">

  <!-- Dashboard -->
  <div id="dashboard-section">
    <div class="dashboard-cards">
      <div class="card"><h3>Total Questions</h3><p id="totalQuestions">0</p></div>
      <div class="card"><h3>Total Students</h3><p id="totalStudents">0</p></div>
    </div>

    <h3>Students by Parish</h3>
    <div class="search-box">
      <input type="text" id="parishSearch" placeholder="Search parish..." onkeyup="filterParish()">
    </div>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Parish</th><th>Number of Students</th></tr></thead>
        <tbody id="studentsByParishTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Questions Section -->
  <div id="questions-section" style="display:none;">
    <h3>All Questions</h3>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>#</th><th>Question</th><th>A</th><th>B</th><th>C</th><th>D</th><th>Correct</th><th>Action</th></tr></thead>
        <tbody id="questionsTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Students Section -->
  <div id="students-section" style="display:none;">
    <h3>Registered Students</h3>
    <div class="search-box">
      <input type="text" id="studentSearch" placeholder="Search by name, email, phone, parish..." onkeyup="filterStudents()">
    </div>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Parish</th></tr></thead>
        <tbody id="studentsTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Leaderboard Section -->
  <div id="leaderboard-section" style="display:none;">
    <h3>Leaderboard</h3>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Parish</th><th>Score</th></tr></thead>
        <tbody id="leaderboardTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
// Section switch
function showSection(section){
  ['dashboard','questions','students','leaderboard'].forEach(s=>document.getElementById(s+'-section').style.display=(s===section)?'block':'none');
}

// Logout
function logoutAdmin(){ localStorage.removeItem('adminLoggedIn'); location.reload(); }

// Fetch dashboard data
async function fetchDashboard(){
  try {
    // Total Questions
    const qRes = await fetch(`/admin/questions`); const qData = await qRes.json();
    document.getElementById('totalQuestions').innerText = qData.questions.length || 0;

    // Total Students
    const sRes = await fetch(`/admin/students`); const sData = await sRes.json();
    document.getElementById('totalStudents').innerText = sData.students.length || 0;

    // Students by Parish
    const parishCount = {};
    sData.students.forEach(s => { 
      if(!s.parish) return;
      parishCount[s.parish] = (parishCount[s.parish] || 0) + 1;
    });
    const tbody = document.getElementById('studentsByParishTable');
    tbody.innerHTML = '';
    Object.keys(parishCount).forEach(p => tbody.innerHTML += `<tr><td>${p}</td><td>${parishCount[p]}</td></tr>`);
  } catch(e){ console.error(e); }
}

// Search Parish
function filterParish(){
  const filter = document.getElementById('parishSearch').value.toLowerCase();
  document.querySelectorAll('#studentsByParishTable tr').forEach(row=>{
    const parish = row.children[0].innerText.toLowerCase();
    row.style.display = parish.includes(filter) ? '' : 'none';
  });
}

// Search Students
function filterStudents(){
  const filter = document.getElementById('studentSearch').value.toLowerCase();
  document.querySelectorAll('#studentsTableBody tr').forEach(row=>{
    const text = Array.from(row.children).map(td=>td.innerText.toLowerCase()).join(' ');
    row.style.display = text.includes(filter) ? '' : 'none';
  });
}

// Initial load
window.onload = function(){ fetchDashboard(); };
</script>

</body>
</html>
