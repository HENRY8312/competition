<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - Mathematics Competition</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Segoe UI", Arial, sans-serif;
background:linear-gradient(135deg,#007bff,#00c6ff);
padding:20px;
}

h2,h3{
text-align:center;
margin-bottom:15px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

form{
margin-bottom:30px;
}

input,select,textarea,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

input:focus,select:focus,textarea:focus{
outline:none;
border-color:#007bff;
box-shadow:0 0 5px rgba(0,123,255,0.3);
}

textarea{
min-height:80px;
resize:vertical;
}

button{
background:linear-gradient(45deg,#007bff,#00aaff);
color:white;
border:none;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:linear-gradient(45deg,#0056b3,#0088cc);
transform:scale(1.02);
}

.table-wrapper{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
min-width:700px;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
font-size:14px;
}

th{
background:#007bff;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

#admin-actions{
text-align:center;
margin-top:20px;
}

#admin-actions button{
width:auto;
padding:12px 25px;
margin:10px;
}

.login-box{
max-width:400px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Mobile improvements */

@media(max-width:768px){

.container{
padding:15px;
}

h2{
font-size:22px;
}

h3{
font-size:18px;
}

table{
font-size:12px;
}

}

</style>

</head>

<body>

<h2>Admin Panel - Mathematics Competition</h2>

<!-- ADMIN LOGIN -->
<div id="admin-login" class="login-box">

<form id="loginForm">

<h3>Admin Login</h3>

<input type="text" id="adminUsername" placeholder="Username" required>

<input type="password" id="adminPassword" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" class="container" style="display:none;">

<!-- ADD QUESTION -->
<form id="question-form">

<h3>Add New Question</h3>

<textarea id="questionText" placeholder="Enter question" required></textarea>

<input type="text" id="optionA" placeholder="Option A" required>

<input type="text" id="optionB" placeholder="Option B" required>

<input type="text" id="optionC" placeholder="Option C" required>

<input type="text" id="optionD" placeholder="Option D" required>

<select id="correctAnswer" required>

<option value="">Select Correct Answer</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>

</select>

<button type="submit">Add Question</button>

</form>

<!-- QUESTIONS TABLE -->

<h3>All Questions</h3>

<div class="table-wrapper">

<table id="questionsTable">

<thead>

<tr>

<th>#</th>
<th>Question</th>
<th>Option A</th>
<th>Option B</th>
<th>Option C</th>
<th>Option D</th>
<th>Correct</th>
<th>Action</th>

</tr>

</thead>

<tbody id="questionsTableBody"></tbody>

</table>

</div>

<!-- STUDENTS TABLE -->

<h3>Registered Students</h3>

<div class="table-wrapper">

<table id="studentsTable">

<thead>

<tr>

<th>#</th>
<th>Full Name</th>
<th>Email</th>
<th>Phone</th>
<th>Parish</th>
<th>Score</th>
<th>Action</th>

</tr>

</thead>

<tbody id="studentsTableBody"></tbody>

</table>

</div>

<!-- ADMIN ACTIONS -->

<div id="admin-actions">

<button onclick="window.location='leaderboard.html'">View Leaderboard</button>

<button onclick="logoutAdmin()">Logout</button>

</div>

</div>

<script>

// ------------------- ADMIN LOGIN -------------------
const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e){

e.preventDefault();

const username = document.getElementById("adminUsername").value;
const password = document.getElementById("adminPassword").value;

if(username === "admin" && password === "adminwccrm8312"){

localStorage.setItem("adminLoggedIn","true");

document.getElementById("admin-login").style.display="none";
document.getElementById("admin-panel").style.display="block";

loadQuestions();
loadStudents();

alert("Admin logged in successfully!");

}else{

alert("Invalid admin credentials!");

}

});

// LOGOUT
function logoutAdmin(){

localStorage.removeItem("adminLoggedIn");
location.reload();

}

// ADD QUESTION
const questionForm=document.getElementById("question-form");

questionForm.addEventListener("submit",async function(e){

e.preventDefault();

const question=document.getElementById("questionText").value;
const optionA=document.getElementById("optionA").value;
const optionB=document.getElementById("optionB").value;
const optionC=document.getElementById("optionC").value;
const optionD=document.getElementById("optionD").value;
const answer=document.getElementById("correctAnswer").value;

try{

const res=await fetch("/addQuestion",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question,optionA,optionB,optionC,optionD,answer})

});

const data=await res.json();

if(data.success){

alert("Question added successfully!");
questionForm.reset();
loadQuestions();

}else{

alert("Failed to add question");

}

}catch(err){

alert("Error adding question");

}

});

// LOAD QUESTIONS
async function loadQuestions(){

const tbody=document.getElementById("questionsTableBody");

try{

const res=await fetch("/admin/questions");
const data=await res.json();

tbody.innerHTML="";

if(data.success && data.length>0){

data.forEach((q,index)=>{

const row=document.createElement("tr");

row.innerHTML=`
<td>${index+1}</td>
<td>${q.question}</td>
<td>${q.optionA}</td>
<td>${q.optionB}</td>
<td>${q.optionC}</td>
<td>${q.optionD}</td>
<td>${q.answer}</td>
<td><button onclick="deleteQuestion(${q.id})">Delete</button></td>
`;

tbody.appendChild(row);

});

}else{

tbody.innerHTML="<tr><td colspan='8'>No questions yet</td></tr>";

}

}catch{

tbody.innerHTML="<tr><td colspan='8'>Failed to load questions</td></tr>";

}

}

// LOAD STUDENTS
async function loadStudents(){

const tbody=document.getElementById("studentsTableBody");

try{

const res=await fetch("/admin/students");
const data=await res.json();

tbody.innerHTML="";

if(data.success && data.students.length>0){

data.students.forEach((s,index)=>{

const row=document.createElement("tr");

row.innerHTML=`
<td>${index+1}</td>
<td>${s.name}</td>
<td>${s.email}</td>
<td>${s.mobile}</td>
<td>${s.parish}</td>
<td>${s.score || 0}</td>
<td><button onclick="deleteStudent(${s.id})">Delete</button></td>
`;

tbody.appendChild(row);

});

}else{

tbody.innerHTML="<tr><td colspan='7'>No registered students yet</td></tr>";

}

}catch{

tbody.innerHTML="<tr><td colspan='7'>Failed to load students</td></tr>";

}

}

// DELETE QUESTION
async function deleteQuestion(id){

if(!confirm("Delete this question?")) return;

const res=await fetch(`/admin/question/${id}`,{method:"DELETE"});
const data=await res.json();

if(data.success){

loadQuestions();

}else{

alert("Failed to delete");

}

}

// DELETE STUDENT
async function deleteStudent(id){

if(!confirm("Delete this student?")) return;

const res=await fetch(`/admin/student/${id}`,{method:"DELETE"});
const data=await res.json();

if(data.success){

loadStudents();

}else{

alert("Failed to delete student");

}

}

// CHECK LOGIN
window.onload=function(){

const adminLoggedIn=localStorage.getItem("adminLoggedIn");

if(adminLoggedIn==="true"){

document.getElementById("admin-login").style.display="none";
document.getElementById("admin-panel").style.display="block";

loadQuestions();
loadStudents();

}

}

</script>

</body>
</html>
