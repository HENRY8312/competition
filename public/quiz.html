<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathematics Competition</title>
<style>
/* --- GLOBAL --- */
* {margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI", Arial, sans-serif;}
body {background: radial-gradient(circle at top left,#001f44,#003366); color:#fff; padding:20px;}
.container {max-width:950px; margin:auto; background:#0d1b2a; padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.5);}
h2 {text-align:center; font-size:32px; margin-bottom:20px; color:#00ffff; text-shadow:0 0 10px #00ffff,0 0 20px #ff00ff;}
/* --- TIMER --- */
#timer {text-align:center; font-size:26px; font-weight:bold; margin-bottom:20px; color:#ff0066; text-shadow:0 0 5px #ff66aa,0 0 15px #ff00ff,0 0 25px #ff66ff;}
/* --- PROGRESS BAR --- */
.progress-container {width:100%; background:#111; border-radius:12px; margin-bottom:25px; overflow:hidden; box-shadow:0 0 10px #00ffff inset;}
.progress-bar {height:14px; width:0%; background:linear-gradient(90deg,#ff0066,#00ffff); box-shadow:0 0 10px #ff00ff,0 0 15px #00ffff; transition: width 0.3s ease;}
/* --- NAV BUTTONS --- */
.nav {text-align:center; margin-bottom:25px; flex-wrap:wrap; display:flex; justify-content:center; gap:5px;}
.nav button {padding:10px 14px; border:none; background:#222; color:#fff; cursor:pointer; border-radius:8px; font-weight:bold; font-size:16px; box-shadow:0 0 5px #00ffff; transition:0.3s;}
.nav button:hover {background:#00ffff; color:#222; box-shadow:0 0 15px #00ffff,0 0 25px #66ffcc;}
.nav button.answered {background:#28a745; color:#fff; box-shadow:0 0 10px #28a745,0 0 20px #00ffcc;}
/* --- QUESTIONS --- */
.question {background:#111; padding:18px; border-radius:10px; margin-bottom:20px; box-shadow:0 0 15px #ff00ff,0 0 25px #00ffff; opacity:0; transform:translateY(20px); animation:fadeIn 0.6s forwards;}
.question h3 {margin-bottom:12px; color:#00ffff; text-shadow:0 0 5px #00ffff;}
label {display:block; padding:10px; cursor:pointer; border-radius:6px; background:#222; margin-bottom:8px; transition:0.3s; color:#fff;}
label:hover {background:#333; box-shadow:0 0 8px #ff00ff,0 0 15px #00ffff;}
input[type=radio] {margin-right:10px; accent-color:#00ffff;}
/* --- SUBMIT BUTTON --- */
button.submit {display:block; margin:30px auto; padding:16px 36px; font-size:18px; background:linear-gradient(45deg,#ff0066,#00ffff); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; box-shadow:0 0 10px #ff0066,0 0 20px #00ffff; transition:all 0.3s ease;}
button.submit:hover {transform:scale(1.08); box-shadow:0 0 25px #ff66aa,0 0 35px #66ffff;}
/* --- MEDIA --- */
@media(max-width:768px){
  .container{padding:20px;}
  .question h3{font-size:18px;}
  label{font-size:16px;}
  .nav button{padding:8px 12px; font-size:14px;}
}
/* --- ANIMATIONS --- */
@keyframes fadeIn {to {opacity:1; transform:translateY(0);}}
</style>
</head>
<body>
<div class="container">
  <h2>Mathematics Competition</h2>
  <div id="timer">Time: 60:00</div>
  <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
  <div class="nav" id="navButtons"></div>
  <div id="quiz"></div>
  <button class="submit" onclick="submitQuiz()">Submit Answers</button>
</div>

<script>
// =================== ANTI-CHEAT ===================
if(localStorage.getItem("quizActive")) { alert("Quiz already running in another tab."); window.location="login.html"; }
localStorage.setItem("quizActive",true);
window.addEventListener("beforeunload",()=>localStorage.removeItem("quizActive"));
document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("copy", e=>e.preventDefault());
document.onkeydown=function(e){
  if(e.keyCode==123 || (e.ctrlKey && e.shiftKey && ['I','J'].includes(String.fromCharCode(e.keyCode))) || (e.ctrlKey && e.keyCode==85)) return false;
};
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden){ alert("You left the quiz page. Quiz will be submitted."); submitQuiz(); }
});

// =================== QUIZ LOGIC ===================
let time = localStorage.getItem("quizTime") ? parseInt(localStorage.getItem("quizTime")) : 3600;
let questions = [];
let answers = JSON.parse(localStorage.getItem("answers") || "{}");

function startTimer(){
  const timerElement=document.getElementById("timer");
  const interval=setInterval(()=>{
    let minutes=Math.floor(time/60), seconds=time%60;
    timerElement.innerText=`Time: ${minutes}:${seconds<10?'0'+seconds:seconds}`;
    time--;
    localStorage.setItem("quizTime",time);
    if(time<0){ clearInterval(interval); alert("Time is up! Submitting automatically"); submitQuiz(); }
  },1000);
}
startTimer();

function shuffleArray(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

async function loadQuiz() {
    try {
        const res = await fetch("/questions");
        const data = await res.json();
        if(!data.success || !data.questions || data.questions.length === 0){
            document.getElementById("quiz").innerHTML = "<p style='text-align:center'>No questions available.</p>";
            return;
        }

        questions = data.questions;
        let html = "";
        let nav = "";

        questions.forEach((q, i) => {
            let opts = [
                {key:'A',text:q.optionA},
                {key:'B',text:q.optionB},
                {key:'C',text:q.optionC},
                {key:'D',text:q.optionD}
            ];
            opts = shuffleArray(opts);

            html += `<div class="question" id="q${q.id}"><h3>${i+1}. ${q.question}</h3>`;
            opts.forEach(opt=>{
                html += `<label><input type="radio" name="q${q.id}" value="${opt.key}" onchange="saveAnswer(${q.id},'${opt.key}')">${opt.text}</label>`;
            });
            html += "</div>";

            nav += `<button onclick="scrollToQuestion(${q.id})" id="nav${q.id}">${i+1}</button>`;
        });

        document.getElementById("quiz").innerHTML = html;
        document.getElementById("navButtons").innerHTML = nav;

        restoreAnswers();
        updateProgress();

    } catch(err){
        console.error(err);
        document.getElementById("quiz").innerHTML="<p style='text-align:center'>Failed to load questions.</p>";
    }
}

loadQuiz();

function saveAnswer(id,value){
  answers["q"+id]=value;
  localStorage.setItem("answers",JSON.stringify(answers));
  document.getElementById("nav"+id).classList.add("answered");
  updateProgress();
}

function restoreAnswers(){
  Object.keys(answers).forEach(key=>{
    const input = document.querySelector(`input[name="${key}"][value="${answers[key]}"]`);
    if(input) input.checked=true;
    const qid = key.replace("q","");
    const navBtn = document.getElementById("nav"+qid);
    if(navBtn) navBtn.classList.add("answered");
  });
}

function updateProgress(){
  let total=questions.length;
  let answered=Object.keys(answers).length;
  let percent=(answered/total)*100;
  document.getElementById("progressBar").style.width=percent+"%";
}

function scrollToQuestion(id){
  document.getElementById("q"+id).scrollIntoView({behavior:"smooth"});
}

window.onbeforeunload=function(){ return "You may lose your quiz progress"; }

async function submitQuiz(){
  const studentId = localStorage.getItem("studentId");
  const savedAnswers = JSON.parse(localStorage.getItem("answers") || "{}");
  if(!studentId || Object.keys(savedAnswers).length === 0) return alert("No answers to submit or student not logged in");

  try{
    const res = await fetch("/submitQuiz",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({studentId,answers:savedAnswers})
    });
    const data = await res.json();

    localStorage.removeItem("answers");
    localStorage.removeItem("quizOrder");
    localStorage.removeItem("quizTime");
    localStorage.removeItem("quizActive");

    if(data.success){
      alert("Your score: "+data.score);
      window.location="leaderboard.html";
    } else {
      alert("Submission failed: "+(data.message || "Unknown error"));
    }
  }catch(err){ console.error(err); alert("Error submitting quiz"); }
}
</script>
</body>
</html>
