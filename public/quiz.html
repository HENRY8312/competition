<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mathematics Competition</title>

<style>

/* ---------- GLOBAL ---------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}

body{
background:#f5f6fa;
color:#333;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* ---------- TOP BAR ---------- */

.top-bar{
position:sticky;
top:0;
background:#40739e;
color:white;
padding:15px;
display:flex;
flex-wrap:wrap;
justify-content:space-between;
align-items:center;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
margin-bottom:20px;
}

.top-bar span{
font-weight:bold;
}

#timer{
background:#f1f2f6;
color:#e84118;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
}

/* ---------- PROGRESS ---------- */

.progress-container{
width:100%;
height:14px;
background:#dcdde1;
border-radius:10px;
margin-top:10px;
}

.progress-bar{
height:14px;
width:0%;
background:#27ae60;
border-radius:10px;
transition:width 0.3s;
}

/* ---------- QUESTION PALETTE ---------- */

.palette-container{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

#navButtons{
display:grid;
grid-template-columns:repeat(auto-fill,40px);
gap:8px;
}

#navButtons button{
width:40px;
height:40px;
border:none;
border-radius:6px;
background:#dcdde1;
font-weight:bold;
cursor:pointer;
}

#navButtons button.answered{
background:#27ae60;
color:white;
}

#navButtons button.current{
border:2px solid #40739e;
}

/* ---------- QUESTIONS ---------- */

.question{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.question h3{
margin-bottom:10px;
}

label{
display:block;
background:#f1f2f6;
padding:10px;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
}

label:hover{
background:#dcdde1;
}

/* ---------- SUBMIT BUTTON ---------- */

.submit{
display:block;
margin:30px auto;
padding:15px 40px;
font-size:18px;
background:#40739e;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.submit:hover{
background:#2f3640;
}

/* ---------- REVIEW MODAL ---------- */

#reviewModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:200;
}

#reviewContent{
background:white;
padding:30px;
border-radius:10px;
width:90%;
max-width:600px;
}

.review-summary{
display:flex;
gap:10px;
margin-bottom:20px;
}

.summary-box{
flex:1;
color:white;
padding:15px;
border-radius:8px;
text-align:center;
font-weight:bold;
}

.summary-box span{
display:block;
font-size:26px;
margin-top:5px;
}

.total{background:#40739e;}
.answered{background:#27ae60;}
.unanswered{background:#e84118;}

#reviewList li{
padding:14px;
margin-bottom:10px;
border-radius:6px;
background:#f5f6fa;
font-size:18px;
font-weight:600;
cursor:pointer;
}

#reviewList li.answered{
color:#27ae60;
border-left:6px solid #27ae60;
}

#reviewList li.unanswered{
color:#e84118;
border-left:6px solid #e84118;
}

/* ---------- CONFIRM MODAL ---------- */

#confirmSubmitModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:300;
}

.confirm-box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:90%;
max-width:400px;
}

.confirm-buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.confirm-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.goBack{background:#e84118;color:white;}
.submitAnyway{background:#27ae60;color:white;}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">

<div><span>WATCHMAN YOUTH EMPOWERMENT PROGRAMME</span></div>
<div> <span>Mathematics Competition</span></div>
<div>Total Questions <span id="totalQuestions">0</span></div>
<div id="timer">Time: 00:00</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

</div>

<div class="palette-container">
<h3>Question Navigator</h3>
<div id="navButtons"></div>
</div>

<div id="quiz"></div>

<button class="submit" onclick="showReview()">Submit Answers</button>

</div>

<!-- REVIEW MODAL -->

<div id="reviewModal">

<div id="reviewContent">

<h3>Review Your Answers</h3>

<div class="review-summary">

<div class="summary-box total">
Total
<span id="totalCount"></span>
</div>

<div class="summary-box answered">
Answered
<span id="answeredCount"></span>
</div>

<div class="summary-box unanswered">
Unanswered
<span id="unansweredCount"></span>
</div>

</div>

<ul id="reviewList"></ul>

<button class="submit" onclick="checkBeforeSubmit()">Confirm & Submit</button>

</div>

</div>

<!-- CONFIRM SUBMIT MODAL -->

<div id="confirmSubmitModal">

<div class="confirm-box">

<h3>Confirm Submission</h3>

<p id="submitWarningText"></p>

<div class="confirm-buttons">

<button class="goBack" onclick="cancelSubmit()">Go Back</button>

<button class="submitAnyway" onclick="proceedSubmit()">Submit Anyway</button>

</div>

</div>

</div>

<script>

/* ---------- GLOBAL VARIABLES ---------- */

let questions=[];
let answers=JSON.parse(localStorage.getItem("answers")||"{}");

/* ---------- LOAD QUESTIONS ---------- */

async function loadQuiz(){

const res=await fetch("/questions");
const data=await res.json();

questions=data.questions;

document.getElementById("totalQuestions").innerText=questions.length;

let html="";
let nav="";

questions.forEach((q,i)=>{

html+=`
<div class="question" id="q${q.id}">
<h3>${i+1}. ${q.question}</h3>

<label><input type="radio" name="q${q.id}" value="A" onchange="saveAnswer(${q.id},'A')"> ${q.optionA}</label>
<label><input type="radio" name="q${q.id}" value="B" onchange="saveAnswer(${q.id},'B')"> ${q.optionB}</label>
<label><input type="radio" name="q${q.id}" value="C" onchange="saveAnswer(${q.id},'C')"> ${q.optionC}</label>
<label><input type="radio" name="q${q.id}" value="D" onchange="saveAnswer(${q.id},'D')"> ${q.optionD}</label>
</div>
`;

nav+=`<button onclick="goToQuestion(${q.id})" id="nav${q.id}">${i+1}</button>`;

});

document.getElementById("quiz").innerHTML=html;
document.getElementById("navButtons").innerHTML=nav;

restoreAnswers();

}

loadQuiz();

/* ---------- SAVE ANSWER ---------- */

function saveAnswer(id,value){

answers["q"+id]=value;

localStorage.setItem("answers",JSON.stringify(answers));

document.getElementById("nav"+id).classList.add("answered");

updateProgress();

}

/* ---------- RESTORE ANSWERS ---------- */

function restoreAnswers(){

Object.keys(answers).forEach(key=>{

const input=document.querySelector(`input[name="${key}"][value="${answers[key]}"]`);

if(input) input.checked=true;

});

updateProgress();

}

/* ---------- PROGRESS ---------- */

function updateProgress(){

let total=questions.length;
let answered=Object.keys(answers).length;

document.getElementById("progressBar").style.width=(answered/total*100)+"%";

}

/* ---------- NAVIGATION ---------- */

function goToQuestion(id){

document.getElementById("q"+id).scrollIntoView({behavior:"smooth"});

}

/* ---------- REVIEW PANEL ---------- */

function showReview(){

const ul=document.getElementById("reviewList");
ul.innerHTML="";

let answered=0;

questions.forEach((q,i)=>{

const ans=answers["q"+q.id];

const li=document.createElement("li");

if(ans){

li.classList.add("answered");
li.innerHTML=`Question ${i+1} — Answered`;
answered++;

}else{

li.classList.add("unanswered");
li.innerHTML=`Question ${i+1} — Not Answered`;

}

li.onclick=()=>{

document.getElementById("reviewModal").style.display="none";

goToQuestion(q.id);

};

ul.appendChild(li);

});

document.getElementById("totalCount").innerText=questions.length;
document.getElementById("answeredCount").innerText=answered;
document.getElementById("unansweredCount").innerText=questions.length-answered;

document.getElementById("reviewModal").style.display="flex";

}

/* ---------- SUBMIT WARNING ---------- */

function checkBeforeSubmit(){

let unanswered=questions.length-Object.keys(answers).length;

if(unanswered>0){

document.getElementById("submitWarningText").innerHTML=
`You still have <b style="color:red">${unanswered}</b> unanswered questions`;

}else{

document.getElementById("submitWarningText").innerHTML=
`You have answered all questions`;

}

document.getElementById("confirmSubmitModal").style.display="flex";

}

function cancelSubmit(){

document.getElementById("confirmSubmitModal").style.display="none";

}

function proceedSubmit(){

finalSubmit();

}

/* ---------- FINAL SUBMIT ---------- */

async function finalSubmit(){

const studentId=localStorage.getItem("studentId");

const res=await fetch("/submitQuiz",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({studentId,answers})

});

const data=await res.json();

alert("Your Score: "+data.score);

localStorage.clear();

window.location="index.html";

}

/* ---------- INTERNET FAIL ---------- */

window.addEventListener("offline",()=>{

alert("Internet lost. Submitting quiz.");

finalSubmit();

});

/* ---------- TIMER ---------- */

async function startTimer(){

const res=await fetch("/quizTime");
const data=await res.json();

let endTime=new Date(data.endTime).getTime();

setInterval(()=>{

let now=new Date().getTime();

let diff=endTime-now;

if(diff<=0){

alert("Time is up");

finalSubmit();

}

let m=Math.floor(diff/60000);
let s=Math.floor((diff%60000)/1000);

document.getElementById("timer").innerText=`Time: ${m}:${s<10?"0"+s:s}`;

},1000);

}

startTimer();

</script>

</body>
</html>
